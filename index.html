<title>Packet Finz — Personal Finance</title>
<style>
  :root{--violet:#a855f7;--indigo:#6366f1;--cyan:#06b6d4;--emerald:#10b981;--amber:#fbbf24;--pink:#ec4899;--rose:#fb7185;
    --glass:rgba(255,255,255,.08);--stroke:rgba(255,255,255,.14);--ink:#f1f0ff;--dim:#a9a6d6;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body.fs-small{zoom:0.9;} body.fs-large{zoom:1.12;}
  body.hi-contrast{--stroke:rgba(255,255,255,.3);--dim:rgba(255,255,255,.75);--glass:rgba(255,255,255,.12);}
  body.hi-contrast .muted{color:rgba(255,255,255,.65);}
  html,body{min-height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:linear-gradient(145deg,#150f30 0%,#0d1a2e 50%,#12102a 100%);background-attachment:fixed;overflow-x:hidden;overscroll-behavior-y:none;min-height:100vh;padding:16px 16px 72px;}
  body.lock{overflow:hidden;}
  .aurora{display:none;}
  .aurora b{position:absolute;border-radius:50%;mix-blend-mode:screen;}
  .a1{width:60vw;height:60vw;background:#7c3aed;top:-10%;left:-10%;animation:f1 18s ease-in-out infinite;}
  .a2{width:55vw;height:55vw;background:#06b6d4;bottom:-15%;right:-10%;animation:f2 22s ease-in-out infinite;}
  .a3{width:45vw;height:45vw;background:#ec4899;top:30%;right:20%;animation:f3 26s ease-in-out infinite;}
  .a4{width:40vw;height:40vw;background:#10b981;bottom:10%;left:15%;animation:f1 30s ease-in-out infinite reverse;}
  @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8%,6%) scale(1.15)}}
  @keyframes f2{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-7%,-5%) scale(.95)}}
  @keyframes f3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6%,7%) scale(1.2)}}
  .wrap{max-width:760px;margin:0 auto;position:relative;padding-bottom:96px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:rgba(30,22,55,.97);border:1px solid var(--stroke);color:#fff;padding:12px 16px;border-radius:14px;font-size:14px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;gap:14px;max-width:90vw;opacity:0;transition:transform .3s cubic-bezier(.2,.7,.2,1),opacity .3s;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;}
  .toastbtn{background:none;border:none;color:#7dd3fc;font-weight:800;font-size:14px;cursor:pointer;padding:2px 4px;}
  .fab{position:fixed;right:18px;bottom:82px;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--violet),var(--cyan));color:#fff;font-size:32px;font-weight:300;line-height:1;cursor:pointer;box-shadow:0 10px 26px rgba(124,58,237,.6);z-index:55;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .fab:active{transform:scale(.88);}
  .fab.open{transform:rotate(45deg);}
  .fab-scrim{position:fixed;inset:0;z-index:54;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
  .fab-menu{position:fixed;right:20px;bottom:152px;z-index:56;display:flex;flex-direction:column;gap:14px;align-items:flex-end;}
  .fab-act{display:flex;align-items:center;gap:12px;background:none;border:none;cursor:pointer;animation:fabup .22s ease both;}
  .fab-lbl{background:rgba(30,22,55,.98);border:1px solid rgba(124,58,237,.4);color:#fff;font-size:14px;font-weight:700;padding:9px 16px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.4);}
  .fab-mini{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 6px 20px rgba(0,0,0,.5);}
  .fab-mini.ex,.fab-mini.in,.fab-mini.gl{background:linear-gradient(135deg,var(--violet),var(--cyan));}
  .fab-cam{position:fixed;right:18px;bottom:152px;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--violet),var(--cyan));color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 20px rgba(124,58,237,.5);z-index:55;animation:fabup .22s ease both;transition:transform .15s;}
  .fab-cam:active{transform:scale(.9);}
  .vpulse{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,#8b5cf6,#6d28d9);margin:6px auto 12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 12px rgba(139,92,246,.15),0 0 0 24px rgba(139,92,246,.07);animation:vpulse 1.2s ease-in-out infinite;}
  @keyframes vpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .wf i{display:block;height:16px;border-radius:8px;transform:scaleX(0);transform-origin:left;animation:wfg .6s ease forwards;animation-delay:var(--d,0s);}
  @keyframes wfg{to{transform:scaleX(1)}}
  @keyframes skf{to{opacity:.5}}

  .theme-sw{width:46px;height:46px;border-radius:50%;padding:0;cursor:pointer;background:var(--sw) !important;border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex:0 0 auto;}
  .theme-sw.on{border:3px solid #fff;}
  body.ui-term .theme-sw,body.ui-bank .theme-sw,body.ui-native .theme-sw{background:var(--sw) !important;border-radius:50% !important;color:#fff !important;font-size:16px !important;width:46px !important;height:46px !important;padding:0 !important;text-transform:none !important;letter-spacing:0 !important;}

  body.ui-bank .btn,body.ui-bank .ghost,body.ui-bank .iconbtn,body.ui-bank .pill,body.ui-bank .segbtn,body.ui-bank .addbtn,body.ui-bank button{background:transparent !important;border:1px solid #232a31 !important;border-radius:2px !important;color:#c9a227 !important;font-family:-apple-system,system-ui,sans-serif !important;font-size:11px !important;letter-spacing:1px;text-transform:uppercase;}

  body.ui-bank .fab-mini{background:#c9a227 !important;color:#101418 !important;}
  body.ui-bank .pillon,body.ui-bank .segbtn.on,body.ui-bank .subtab.on{background:#c9a227 !important;color:#101418 !important;border-color:#c9a227 !important;}
  body.ui-bank input,body.ui-bank select,body.ui-bank .qsel,body.ui-bank .pinfield{background:#0d1216 !important;border:1px solid #232a31 !important;border-radius:2px !important;color:#e9e6df !important;font-family:-apple-system,system-ui,sans-serif !important;}
  body.ui-bank .goalrow,body.ui-bank .lrow,body.ui-bank .lrow2,body.ui-bank .tx-row,body.ui-bank .catrow,body.ui-bank .srow,body.ui-bank .insrow{background:transparent !important;border:none !important;border-bottom:1px solid #1b2127 !important;border-radius:0 !important;padding:11px 0 !important;font-size:14px;}
  body.ui-bank .bgbar,body.ui-bank .udash-bartrack,body.ui-bank .cat-card-bar{background:#232a31 !important;height:2px !important;border-radius:0 !important;}
  body.ui-bank .bgbar i,body.ui-bank .udash-barfill{border-radius:0 !important;background:#c9a227 !important;}
  body.ui-bank .dot{width:5px !important;height:5px !important;min-width:5px !important;}

  body.ui-bank .navbtn,body.ui-bank .seg .segbtn{background:transparent !important;border:none !important;font-family:-apple-system,system-ui,sans-serif !important;font-size:9px !important;letter-spacing:1px;}
  body.ui-bank .toast{background:#141a20 !important;border:1px solid #c9a227 !important;border-radius:2px !important;}
  body.ui-bank .greet-hi{font-size:20px !important;font-weight:400 !important;}
  body.ui-bank .brandmark svg{filter:none !important;}

  /* ================= NATIVE GROUPED STYLE ================= */
  body.ui-native{background:#000 !important;background-attachment:fixed;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#fff;
    --ink:#fff;--dim:#8e8e93;--stroke:#2c2c2e;--glass:#1c1c1e;}
  body.ui-native .aurora,body.ui-native .bal-shimmer{display:none !important;}

  body.ui-native .glass,body.ui-native .panel,body.ui-native .modal,body.ui-native .sheet,body.ui-native .onbcard,body.ui-native .cat-card,body.ui-native .conv-card,body.ui-native .cmp-card,body.ui-native .hero{background:#1c1c1e !important;border:none !important;border-radius:14px !important;padding:14px 16px;}
  body.ui-native .secttitle,body.ui-native .tool-lbl,body.ui-native .bal-lbl{font-size:11px !important;letter-spacing:.4px !important;color:#8e8e93 !important;text-transform:uppercase;font-weight:600;}
  body.ui-native .muted,body.ui-native .empty{color:#8e8e93 !important;}
  body.ui-native .udash-bigbal{font-size:34px !important;font-weight:700 !important;color:#fff !important;background:none !important;-webkit-text-fill-color:#fff !important;letter-spacing:-1px !important;}

  body.ui-native input,body.ui-native select,body.ui-native .qsel,body.ui-native .pinfield{background:#2c2c2e !important;border:none !important;border-radius:10px !important;color:#fff !important;font-size:16px !important;padding:11px 13px !important;}
  body.ui-native .goalrow,body.ui-native .lrow,body.ui-native .lrow2,body.ui-native .tx-row,body.ui-native .catrow,body.ui-native .srow,body.ui-native .insrow{background:transparent !important;border:none !important;border-bottom:.5px solid #2c2c2e !important;border-radius:0 !important;padding:11px 0 !important;font-size:15px;}

  body.ui-native .bgbar i,body.ui-native .udash-barfill{border-radius:2px !important;}
  body.ui-native .seg,body.ui-native .segbar{background:rgba(28,28,30,.94) !important;border-top:.5px solid #2c2c2e !important;}
  body.ui-native .navbtn.on,body.ui-native .seg .segbtn.on{color:#0a84ff !important;background:transparent !important;}
  body.ui-native .toast{background:#2c2c2e !important;border:none !important;border-radius:12px !important;}
  body.ui-native .avatar{background:#0a84ff !important;color:#fff !important;border:none !important;}

  /* ================= TERMINAL STYLE ================= */
  body.ui-term{background:#0b0e11 !important;background-attachment:fixed;font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;color:#c9d1d9;
    --ink:#c9d1d9;--dim:#6e7681;--stroke:#1c2128;--glass:#14181d;}
  body.ui-term .aurora,body.ui-term .confetti,body.ui-term .coins,body.ui-term .bal-shimmer{display:none !important;}
  body.ui-term *{border-radius:0 !important;box-shadow:none !important;backdrop-filter:none !important;-webkit-backdrop-filter:none !important;text-shadow:none !important;letter-spacing:0;}
  body.ui-term .glass,body.ui-term .panel,body.ui-term .modal,body.ui-term .sheet,body.ui-term .onbcard,body.ui-term .cat-card,body.ui-term .conv-card,body.ui-term .cmp-card,body.ui-term .hero{background:#14181d !important;border:1px solid #1c2128 !important;}
  body.ui-term .panel,body.ui-term .glass{padding:10px 12px;}
  body.ui-term .secttitle,body.ui-term .tool-lbl,body.ui-term .bal-lbl,body.ui-term label{font-size:9px !important;letter-spacing:1.4px !important;color:#6e7681 !important;text-transform:uppercase;font-weight:500;}
  body.ui-term .muted,body.ui-term .empty{color:#6e7681 !important;font-size:11px;}
  body.ui-term .udash-bigbal,body.ui-term .fxresult,body.ui-term .tool-result,body.ui-term .bal-val,body.ui-term .dval,body.ui-term .tx-amt,body.ui-term .cat-card-amt{font-variant-numeric:tabular-nums;font-family:inherit;}
  body.ui-term .udash-bigbal{font-size:32px !important;font-weight:500 !important;color:#3fb950 !important;background:none !important;-webkit-text-fill-color:#3fb950 !important;letter-spacing:-1px !important;}
  body.ui-term .bal-badge{background:transparent !important;border:1px solid #1c2128 !important;color:#6e7681 !important;font-size:10px !important;padding:3px 8px !important;}
  body.ui-term .bal-badge.pos{color:#3fb950 !important;border-color:#23713a !important;}
  body.ui-term .bal-badge.neg{color:#f85149 !important;border-color:#7d2b28 !important;}
  body.ui-term .btn,body.ui-term .ghost,body.ui-term .iconbtn,body.ui-term .pill,body.ui-term .segbtn,body.ui-term .calcbtn,body.ui-term .addbtn,body.ui-term .toastbtn,body.ui-term button{background:#14181d !important;border:1px solid #1c2128 !important;color:#c9d1d9 !important;font-family:inherit !important;font-size:11px !important;letter-spacing:.6px;text-transform:uppercase;}
  body.ui-term .primary,body.ui-term .fab{background:#14181d !important;border:1px solid var(--violet) !important;color:var(--violet) !important;}
  body.ui-term .fab{width:44px !important;height:44px !important;font-size:22px !important;}
  body.ui-term .fab-mini{background:#14181d !important;border:1px solid var(--violet) !important;width:34px !important;height:34px !important;}
  body.ui-term .fab-lbl{background:#14181d !important;border:1px solid #1c2128 !important;font-size:10px !important;text-transform:uppercase;}
  body.ui-term .pillon,body.ui-term .segbtn.on,body.ui-term .subtab.on,body.ui-term .tab.on{background:#14181d !important;border-color:var(--violet) !important;color:var(--violet) !important;}
  body.ui-term input,body.ui-term select,body.ui-term textarea,body.ui-term .qsel,body.ui-term .pinfield{background:#0b0e11 !important;border:1px solid #1c2128 !important;color:#c9d1d9 !important;font-family:inherit !important;font-size:13px !important;padding:8px 10px !important;}

  body.ui-term .goalrow,body.ui-term .lrow,body.ui-term .lrow2,body.ui-term .tx-row,body.ui-term .catrow,body.ui-term .srow,body.ui-term .insrow,body.ui-term .chrow{background:transparent !important;border:none !important;border-bottom:1px solid #14181d !important;padding:7px 0 !important;font-size:12px;}

  body.ui-term .navbtn,body.ui-term .seg .segbtn{background:transparent !important;border:none !important;font-size:9px !important;}
  body.ui-term .toast{background:#14181d !important;border:1px solid var(--violet) !important;font-family:inherit !important;font-size:11px !important;}
  body.ui-term .overlay,body.ui-term .sheetov,body.ui-term .fab-scrim{background:rgba(0,0,0,.78) !important;}

  @keyframes petbob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
  @keyframes fabup{from{opacity:0;transform:translateY(14px) scale(.8)}to{opacity:1;transform:none}}
  .ratewrap{display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 0 6px;}
  .ring2{position:relative;width:128px;height:128px;flex-shrink:0;}
  .ring2 .rseg{transition:stroke-dashoffset 1.1s cubic-bezier(.3,0,.2,1);}
  .ring2c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring2c b{font-size:26px;font-weight:800;}
  .ring2c small{font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}

  @keyframes confall{to{transform:translateY(112vh) rotate(720deg);opacity:.15;}}
  .msec.slide-r{animation:slideInR .3s cubic-bezier(.2,.7,.2,1);}
  .msec.slide-l{animation:slideInL .3s cubic-bezier(.2,.7,.2,1);}
  @keyframes slideInR{from{opacity:0;transform:translateX(38px)}to{opacity:1;transform:none}}
  @keyframes slideInL{from{opacity:0;transform:translateX(-38px)}to{opacity:1;transform:none}}
  .nudge{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:var(--ink);cursor:pointer;border-color:rgba(252,211,77,.4);}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .center{justify-content:center;}
  .glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--stroke);border-radius:20px;box-shadow:0 10px 30px rgba(10,5,30,.35);transition:transform .12s,box-shadow .12s;}

  .streak-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);padding:5px 14px;border-radius:20px;margin:8px 0 4px;}

  .skel-circle{border-radius:50%;background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.05) 75%);background-size:400px 100%;animation:skelShimmer 1.4s infinite;}
  .udash.skel .udash-bal,.udash.skel .udash-breakdown,.udash.skel .udash-iebar,.udash.skel .udash-rows,.udash.skel .quick-acts,.udash.skel .udash-divider,.udash.skel .ratewrap{opacity:0;pointer-events:none;}

  .theme-icon{display:inline-block;animation:sunRise .35s ease;}

  .cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 4px;}

  .udash{padding:18px;border-radius:20px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid rgba(168,85,247,.2)!important;box-shadow:0 8px 32px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.08)!important;}

  body.light .udash-bigbal{color:var(--violet)!important;}

  .udash::after{content:'';position:absolute;bottom:-30px;left:-20px;width:120px;height:120px;border-radius:50%;background:rgba(6,182,212,.12);filter:blur(32px);pointer-events:none;z-index:0;}
  body.light .udash::before{background:rgba(168,85,247,.08);}
  body.light .udash::after{background:rgba(6,182,212,.06);}
  .udash>*{position:relative;z-index:1;}
  .udash-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .udash-bal{text-align:center;padding:8px 0 12px;}

  @keyframes catIconBounce{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.5) rotate(-8deg)}60%{transform:scale(.9) rotate(4deg)}80%{transform:scale(1.06) rotate(-2deg)}}
  @keyframes celBounce{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes shimmerSweep{0%{left:-80px;opacity:0}20%{opacity:.6}80%{opacity:.6}100%{left:110%;opacity:0}}
  @keyframes ringPulse{0%,100%{opacity:1}50%{opacity:.55}}

  .bal-anim{animation:countUp .5s ease both;}

  .udash-total{border-top:1px solid rgba(255,255,255,.1);margin-top:6px;padding-top:10px !important;}
  .udash-divider{height:1px;background:rgba(255,255,255,.08);margin:14px 0;}
  .udash-iebar{margin-bottom:4px;}
  .udash-bartrack{height:7px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;}
  .udash-barfill{height:100%;background:linear-gradient(90deg,#fb7185,#a855f7);border-radius:4px;transition:width .5s;}
  .udash-rows{margin-top:8px;}
  .bal-lbl{font-size:10px;letter-spacing:1.5px;color:var(--dim);margin-bottom:6px;}
  .bal-val{font-size:38px;font-weight:800;font-variant-numeric:tabular-nums;color:#fff;line-height:1.1;}
  .bal-badge{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);color:#34d399;}
  .bal-badge.neg{background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.25);color:#fb7185;}
  .ie-bar-wrap{padding:10px 0 4px;border-top:1px solid var(--stroke);margin-top:4px;}
  .bal-rows{border-top:1px solid var(--stroke);margin-top:8px;padding-top:4px;}
  .cat-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px;}
  .cat-card{background:rgba(255,255,255,.04);border:1px solid var(--stroke);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:3px;}
  .cat-card-icon{font-size:24px;}

  .cat-card-pct{font-size:10px;color:var(--dim);}
  .tx-group-hdr{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--violet);padding:8px 0 4px;margin-top:4px;}
  .tx-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--stroke);}
  .tx-icon{font-size:18px;flex-shrink:0;}
  .tx-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-amt{font-size:13px;font-weight:700;flex-shrink:0;font-variant-numeric:tabular-nums;}
  .quick-acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0 4px;}
  .quick-btn{padding:11px;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;font-family:inherit;}
  .quick-btn.recv{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:#34d399;}
  .quick-btn.xfer{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.3);color:#c084fc;}
  .recur-badge{font-size:14px;color:#22d3ee;flex-shrink:0;margin-right:-2px;}
  /* header */
  .hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;position:sticky;top:0;z-index:50;padding:4px 0 10px;margin-top:-4px;background:linear-gradient(145deg,rgba(21,15,48,.97),rgba(13,26,46,.97),rgba(18,16,42,.97));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}

  /* dashboard */

function uid(){return Math.random().toString(36).slice(2,9);}
function emptyBook(){return {months:{},receivables:[],payables:[],budgets:{},recurring:[],goals:[]};}
function defaults(){var d={version:3,profile:{name:"",country:"MY",email:""},settings:{autoCarry:false,pin:"",bio:false,bioId:"",theme:"dark",onboarded:false},categories:defaultCats(),countries:JSON.parse(JSON.stringify(COUNTRIES)),books:{}};Object.keys(COUNTRIES).forEach(function(cc){d.books[cc]=emptyBook();});return d;}
function buildSeed(){var d=defaults();for(var i=1;i<=12;i++){var k="2026-"+("0"+i).slice(-2);d.books.MY.months[k]={income:COUNTRIES.MY.salary.map(function(r){return {id:uid(),name:r[0],amount:0};}),expenses:[]};}return d;}
function migrate(p){
  if(!p.profile)p.profile={name:"",country:"MY",email:""};
  if(!p.profile.country)p.profile.country="MY";
  if(typeof p.profile.email!=="string")p.profile.email="";
  if(!p.settings)p.settings={autoCarry:false,pin:"",bio:false,bioId:""};
  if(typeof p.settings.autoCarry!=="boolean")p.settings.autoCarry=false;
  if(typeof p.settings.pin!=="string")p.settings.pin="";
  if(typeof p.settings.bio!=="boolean")p.settings.bio=false;
  if(typeof p.settings.bioId!=="string")p.settings.bioId="";
  if(typeof p.settings.autoRecurring!=="boolean")p.settings.autoRecurring=false;
  if(typeof p.settings.lastBackup!=="number")p.settings.lastBackup=0;
  if(!p.settings.uiStyle)p.settings.uiStyle="playful";
  if(typeof p.settings.sfx!=="boolean")p.settings.sfx=true;
  if(typeof p.settings.haptics!=="boolean")p.settings.haptics=true;
  if(typeof p.settings.theme!=="string")p.settings.theme="dark";
  p.settings.theme="dark"; // always dark
  if(typeof p.settings.onboarded!=="boolean")p.settings.onboarded=true;
  if(!p.books){p.books={};var home=p.profile.country||"MY";p.books[home]={months:p.months||{},receivables:p.receivables||[],budgets:{}};}
  if(!p.categories||!p.categories.length)p.categories=defaultCats();
  // Add Insurance category if missing
  if(!p.categories.some(function(c){return c.id==='insurance'||/insurance/i.test(c.name);})){
    var insIdx=p.categories.findIndex?p.categories.findIndex(function(c){return c.id==='family';}):5;
    p.categories.splice(insIdx>=0?insIdx:5,0,{id:'insurance',name:'Insurance',color:'#6366f1'});
  }
  if(!p.countries)p.countries=JSON.parse(JSON.stringify(COUNTRIES));
  Object.keys(p.countries).forEach(function(cc){if(!p.books[cc])p.books[cc]=emptyBook();var bk=p.books[cc];if(!bk.budgets)bk.budgets={};if(!bk.receivables)bk.receivables=[];if(!bk.payables)bk.payables=[];if(!bk.months)bk.months={};if(!bk.recurring)bk.recurring=[];if(!bk.goals)bk.goals=[];for(var k in bk.months){(bk.months[k].expenses||[]).forEach(function(r){if(typeof r.cat!=="string")r.cat="";});}});
  delete p.months;delete p.receivables;p.version=3;return p;
}
function load(){try{var v=localStorage.getItem("btx_v1");if(v)return migrate(JSON.parse(v));}catch(e){}var s=buildSeed();persist(s);return s;}
function persist(d){try{localStorage.setItem("btx_v1",JSON.stringify(d));}catch(e){}}
function applyAccent(v,c,c2){
  var r=document.documentElement;
  r.style.setProperty("--violet",v||"#a855f7");
  r.style.setProperty("--indigo",c||"#6366f1");
  r.style.setProperty("--cyan",c2||data.settings.accentC2||"#06b6d4");
}

  {id:"violet",name:"Violet",v:"#a855f7",c:"#6366f1",c2:"#06b6d4"},

// Bank accounts helpers (new per-country structure)
function getBanks(cc){
  if(!data.settings.bankAccounts)data.settings.bankAccounts={};
  if(!data.settings.bankAccounts[cc])data.settings.bankAccounts[cc]=[];
  return data.settings.bankAccounts[cc];
}
function getBankTotal(cc){return getBanks(cc).reduce(function(s,b){return s+(Number(b.balance)||0);},0);}
function importStatements(j,statusEl){
  var counts={income:0,expenses:0,skipped:0};
  var bar=document.getElementById("import-bar");
  var pct=document.getElementById("import-pct");
  var step=document.getElementById("import-step");
  var log=document.getElementById("import-log");
  var prog=document.getElementById("import-progress");
  if(prog)prog.style.display="block";
  function setProgress(p,msg){if(bar)bar.style.width=p+"%";if(pct)pct.textContent=p+"%";if(step)step.textContent=msg;}
  function addLog(msg,color){if(log)log.innerHTML+='<div style="color:'+(color||"var(--dim)")+'">'+msg+'</div>';}

  // Find or create category ID by name
  function catIdByName(name){
    var cats=data.categories||[];
    var n=name.toLowerCase();
    for(var i=0;i<cats.length;i++){if(cats[i].name.toLowerCase()===n||cats[i].name.toLowerCase().indexOf(n)>-1||n.indexOf(cats[i].name.toLowerCase())>-1)return cats[i].id;}
    // Create it
    var colors=["#a855f7","#06b6d4","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316","#6366f1"];
    var newCat={id:uid(),name:name,color:colors[cats.length%colors.length]};
    data.categories.push(newCat);
    return newCat.id;
  }

  // Detect format: new flat {income:[],expenses:[]} or old {maybank:{},hsbc:{}}
  var isNewFormat=Array.isArray(j.income)&&Array.isArray(j.expenses);
  var incTxns=[], expTxns=[];

  if(isNewFormat){
    incTxns=j.income||[];
    expTxns=j.expenses||[];
  } else {
    // old format
    var mbI=j.maybank&&j.maybank.income?j.maybank.income:(j.maybank&&j.maybank.transactions?j.maybank.transactions.filter(function(t){return t.amount>0;}):[]); 
    var mbE=j.maybank&&j.maybank.expenses?j.maybank.expenses:(j.maybank&&j.maybank.transactions?j.maybank.transactions.filter(function(t){return t.amount<0;}):[]); 
    var hsI=j.hsbc&&j.hsbc.income?j.hsbc.income:[];
    var hsE=j.hsbc&&j.hsbc.expenses?j.hsbc.expenses:[];
    incTxns=mbI.concat(hsI); expTxns=mbE.concat(hsE);
  }

  setProgress(10,"Reading "+incTxns.length+" income + "+expTxns.length+" expense transactions...");
  addLog("📂 Found: "+incTxns.length+" income + "+expTxns.length+" expense transactions");

  function addTxn(tx,section){
    var mkey=tx.month||tx.date.slice(0,7);
    if(!data.books.MY)data.books.MY=emptyBook();
    var bk=data.books.MY;
    if(!bk.months[mkey])bk.months[mkey]={income:[],expenses:[],notes:"",notesList:[]};
    var m=bk.months[mkey];
    var nm=(tx.description||"").trim().slice(0,60)||"Transaction";
    var amt=Math.abs(Number(tx.amount)||0);
    if(!amt){counts.skipped++;return;}
    // deduplicate
    var exists=(m[section]||[]).some(function(r){return r.name===nm&&Math.abs(Number(r.amount)-amt)<0.01;});
    if(exists){counts.skipped++;return;}
    var catId=tx.category?catIdByName(tx.category):"";
    var entry={id:uid(),name:nm,amount:amt.toFixed(2),cat:catId,note:(tx.date||"")+" | "+(tx.description||"")};
    m[section].push(entry);
    if(section==='income')counts.income++;else counts.expenses++;
  }

  setTimeout(function(){
    setProgress(20,"Importing income...");
    var tot=incTxns.length+expTxns.length; var done=0;
    incTxns.forEach(function(tx){addTxn(tx,'income');done++;if(done%20===0)setProgress(Math.round(20+40*(done/tot)),"Importing income... "+done+"/"+incTxns.length);});
    setProgress(60,"Importing expenses...");
    var byM={};
    expTxns.forEach(function(tx){addTxn(tx,'expenses');done++;var m=tx.month||tx.date.slice(0,7);byM[m]=(byM[m]||0)+1;});
    setProgress(90,"Saving...");
    // Log monthly summary
    Object.keys(byM).sort().forEach(function(m){addLog("  "+m+": "+byM[m]+" expenses","#a9a6d6");});
    // Category summary
    var catCounts={};expTxns.forEach(function(tx){if(tx.category)catCounts[tx.category]=(catCounts[tx.category]||0)+1;});
    addLog("Categories auto-assigned: "+Object.keys(catCounts).length,"#c084fc");
    setTimeout(function(){
      persist(data);
      setProgress(100,"Done! \u2705");
      if(step)step.style.color="#34d399";
      if(bar)bar.style.background="#34d399";
      var msg="\u2705 "+counts.income+" income + "+counts.expenses+" expenses imported | "+counts.skipped+" skipped";
      addLog(msg,"#34d399");

  if(cb.length)items.push({t:"info",x:"Top spend: "+cb[0].name+" ("+fmt(cb[0].amount)+")"});
  var pcb=catBreakdownFor(pkey),pmap={};pcb.forEach(function(c){pmap[c.id]=c.amount;});
  var jump=null;cb.forEach(function(c){var was=pmap[c.id]||0,inc=c.amount-was;if(was>0&&inc>0&&(!jump||inc>jump.inc))jump={name:c.name,inc:inc,pct:Math.round(inc/was*100)};});
  if(jump&&jump.pct>=15)items.push({t:"bad",x:jump.pct+"% more on "+jump.name+" than last month"});
  if(bcats.length){var over=0;bcats.forEach(function(cid){var _bb=bVal(bg[cid]);if(_bb.p==="m"&&(spent[cid]||0)>_bb.a)over++;});items.push(over>0?{t:"bad",x:over+" "+(over>1?"categories":"category")+" over budget"}:{t:"good",x:"All budgets on track"});}

function trendSVG(vals,labs){
  var W=320,H=112,pad=10,n=vals.length;if(n<2)return '<div class="empty">Not enough history yet.</div>';
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);if(mn===mx){mn-=1;mx+=1;}var rng=mx-mn;var xw=(W-pad*2)/(n-1);
  function X(i){return pad+i*xw;}function Y(v){return pad+(H-pad*2-8)*(1-(v-mn)/rng);}
  var line=vals.map(function(v,i){return X(i)+","+Y(v);}).join(" ");
  var area="M"+X(0)+","+Y(vals[0]);vals.forEach(function(v,i){if(i>0)area+=" L"+X(i)+","+Y(v);});area+=" L"+X(n-1)+","+(H-pad-8)+" L"+X(0)+","+(H-pad-8)+" Z";
  var dots="";vals.forEach(function(v,i){dots+='<circle cx="'+X(i)+'" cy="'+Y(v)+'" r="2.4" fill="#c084fc"/>';});
  var zero="";if(mn<0&&mx>0){var zy=Y(0);zero='<line x1="'+pad+'" y1="'+zy+'" x2="'+(W-pad)+'" y2="'+zy+'" stroke="rgba(255,255,255,.16)" stroke-dasharray="3 3"/>';}
  var lab="";labs.forEach(function(l,i){lab+='<text x="'+X(i)+'" y="'+(H-2)+'" fill="#6f6ba0" font-size="7.5" text-anchor="middle">'+l+'</text>';});
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;height:auto"><defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(168,85,247,.35)"/><stop offset="1" stop-color="rgba(168,85,247,0)"/></linearGradient></defs>'+zero+'<path d="'+area+'" fill="url(#tg)"/><polyline points="'+line+'" fill="none" stroke="#a855f7" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+dots+lab+'</svg>';
}

function tone(f1,f2,dur,type,vol,delay){
  var ac=_actx();if(!ac)return;
  var t0=ac.currentTime+(delay||0);
  var o=ac.createOscillator(),g=ac.createGain();
  o.type=type||"sine";
  o.frequency.setValueAtTime(f1,t0);
  if(f2&&f2!==f1)o.frequency.exponentialRampToValueAtTime(Math.max(40,f2),t0+dur);
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol||0.14,t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(ac.destination);o.start(t0);o.stop(t0+dur+0.04);
}

function setupSwipeNav(){
  var ORDER=["dashboard","insights","calc","accounts","categories"];
  var sx=0,sy2=0,ok=false;
  document.addEventListener("touchstart",function(e){
    if(e.touches.length!==1){ok=false;return;}
    if(state.locked||state.sheet||state.quickAdd||state.showCurrency||state.voiceAdd||state.budgetEdit||state.receiptReview||state.pinSet||state.fabOpen){ok=false;return;}
    var t=e.target;
    if(t&&t.closest&&t.closest("input,select,textarea,button,.heat-grid,[data-noswipe],.qsel")){ok=false;return;}
    // skip if inside a horizontally scrollable container
    var n=t;
    while(n&&n!==document.body){
      if(n.scrollWidth&&n.clientWidth&&n.scrollWidth>n.clientWidth+8){ok=false;return;}
      n=n.parentElement;
    }
    sx=e.touches[0].clientX;sy2=e.touches[0].clientY;ok=true;
  },{passive:true});
  document.addEventListener("touchend",function(e){
    if(!ok)return;ok=false;
    var tc=e.changedTouches&&e.changedTouches[0];if(!tc)return;
    var dx=tc.clientX-sx,dy=tc.clientY-sy2;
    if(Math.abs(dx)<70||Math.abs(dy)>50)return;
    var i=ORDER.indexOf(state.view);if(i<0)return;
    var j=dx<0?i+1:i-1;
    if(j<0||j>=ORDER.length)return;
    state.view=ORDER[j];window.scrollTo(0,0);buzz(8);go(false);
