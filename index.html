<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#150f30" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23a855f7%22%2F%3E%3Cstop%20offset%3D%22.55%22%20stop-color%3D%22%236366f1%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2306b6d4%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%22120%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Ctext%20x%3D%22256%22%20y%3D%22388%22%20font-family%3D%22Georgia%2Cserif%22%20font-size%3D%22320%22%20font-style%3D%22italic%22%20font-weight%3D%22700%22%20fill%3D%22%23fff%22%20text-anchor%3D%22middle%22%3ES%3C%2Ftext%3E%3Ccircle%20cx%3D%22372%22%20cy%3D%22150%22%20r%3D%2216%22%20fill%3D%22%23fff%22%20opacity%3D%22.9%22%2F%3E%3C%2Fsvg%3E" />
<title>Satheesh — Personal Finance</title>
<style>
  :root{--violet:#a855f7;--indigo:#6366f1;--cyan:#06b6d4;--emerald:#10b981;--amber:#fbbf24;--pink:#ec4899;--rose:#fb7185;
    --glass:rgba(255,255,255,.08);--stroke:rgba(255,255,255,.14);--ink:#f1f0ff;--dim:#a9a6d6;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:#150f30;overflow-x:hidden;min-height:100vh;padding:16px;}
  body.lock{overflow:hidden;}
  .aurora{position:fixed;inset:-30% -20%;z-index:-1;filter:blur(60px);opacity:.85;}
  .aurora b{position:absolute;border-radius:50%;mix-blend-mode:screen;}
  .a1{width:60vw;height:60vw;background:#7c3aed;top:-10%;left:-10%;animation:f1 18s ease-in-out infinite;}
  .a2{width:55vw;height:55vw;background:#06b6d4;bottom:-15%;right:-10%;animation:f2 22s ease-in-out infinite;}
  .a3{width:45vw;height:45vw;background:#ec4899;top:30%;right:20%;animation:f3 26s ease-in-out infinite;}
  .a4{width:40vw;height:40vw;background:#10b981;bottom:10%;left:15%;animation:f1 30s ease-in-out infinite reverse;}
  @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8%,6%) scale(1.15)}}
  @keyframes f2{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-7%,-5%) scale(.95)}}
  @keyframes f3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6%,7%) scale(1.2)}}
  .wrap{max-width:760px;margin:0 auto;position:relative;padding-bottom:96px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:rgba(30,22,55,.97);border:1px solid var(--stroke);color:#fff;padding:12px 16px;border-radius:14px;font-size:14px;font-weight:600;box-shadow:0 12px 30px rgba(0,0,0,.5);z-index:90;display:flex;align-items:center;gap:14px;max-width:90vw;opacity:0;transition:transform .3s cubic-bezier(.2,.7,.2,1),opacity .3s;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;}
  .toastbtn{background:none;border:none;color:#7dd3fc;font-weight:800;font-size:14px;cursor:pointer;padding:2px 4px;}
  .fab{position:fixed;right:18px;bottom:22px;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--violet),var(--cyan));color:#fff;font-size:32px;font-weight:300;line-height:1;cursor:pointer;box-shadow:0 10px 26px rgba(124,58,237,.6);z-index:55;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
  .fab:active{transform:scale(.88);}
  .fab.open{transform:rotate(45deg);}
  .fab-scrim{position:fixed;inset:0;z-index:54;}
  .fab-menu{position:fixed;right:20px;bottom:92px;z-index:56;display:flex;flex-direction:column;gap:12px;align-items:flex-end;}
  .fab-act{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;animation:fabup .22s ease both;}
  .fab-lbl{background:rgba(30,22,55,.96);border:1px solid var(--stroke);color:#fff;font-size:13px;font-weight:600;padding:7px 11px;border-radius:10px;}
  .fab-mini{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 6px 16px rgba(0,0,0,.45);}
  .fab-mini.ex{background:linear-gradient(135deg,#fb7185,#ec4899);}
  .fab-mini.in{background:linear-gradient(135deg,#34d399,#06b6d4);}
  .fab-mini.gl{background:linear-gradient(135deg,#a855f7,#6366f1);}
  @keyframes fabup{from{opacity:0;transform:translateY(14px) scale(.8)}to{opacity:1;transform:none}}
  .ratewrap{display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 0 6px;}
  .ring2{position:relative;width:128px;height:128px;flex-shrink:0;}
  .ring2 .rseg{transition:stroke-dashoffset 1.1s cubic-bezier(.3,0,.2,1);}
  .ring2c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring2c b{font-size:26px;font-weight:800;}
  .ring2c small{font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
  .confetti i{position:absolute;top:-24px;width:9px;height:15px;border-radius:2px;animation-name:confall;animation-timing-function:linear;animation-fill-mode:forwards;}
  @keyframes confall{to{transform:translateY(112vh) rotate(720deg);opacity:.15;}}
  .msec.slide-r{animation:slideInR .3s cubic-bezier(.2,.7,.2,1);}
  .msec.slide-l{animation:slideInL .3s cubic-bezier(.2,.7,.2,1);}
  @keyframes slideInR{from{opacity:0;transform:translateX(38px)}to{opacity:1;transform:none}}
  @keyframes slideInL{from{opacity:0;transform:translateX(-38px)}to{opacity:1;transform:none}}
  .nudge{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:var(--ink);cursor:pointer;border-color:rgba(252,211,77,.4);}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .center{justify-content:center;}
  .glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid var(--stroke);border-radius:20px;box-shadow:0 10px 30px rgba(10,5,30,.35);}
  /* header */
  .hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;}
  .brandmark svg{height:40px;width:auto;display:block;filter:drop-shadow(0 4px 12px rgba(124,58,237,.4));}
  .hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .pill{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;background:rgba(255,255,255,.08);border:1px solid var(--stroke);color:var(--ink);font-size:13px;font-weight:700;padding:9px 11px;border-radius:13px;cursor:pointer;transition:transform .15s;}
  .pill:active{transform:scale(.94);}
  .pillon{background:linear-gradient(135deg,var(--violet),var(--cyan));border-color:transparent;color:#fff;}
  .avatar{width:40px;height:40px;border-radius:50%;border:1px solid var(--stroke);background:linear-gradient(135deg,var(--violet),var(--cyan));color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 4px 12px rgba(124,58,237,.5);transition:transform .15s;}
  .avatar:active{transform:scale(.9);}
  .avatar.on{outline:2px solid #fff;outline-offset:1px;}
  .btn{border:none;background:rgba(255,255,255,.07);color:var(--ink);font-size:13px;font-weight:600;padding:10px 12px;border-radius:11px;cursor:pointer;border:1px solid var(--stroke);transition:transform .15s,background .2s;}
  .btn:active{transform:scale(.93);background:rgba(255,255,255,.14);}
  .primary{background:linear-gradient(135deg,var(--violet),var(--indigo));color:#fff;padding:12px 16px;border-radius:13px;font-size:14px;font-weight:700;border:none;cursor:pointer;box-shadow:0 8px 20px rgba(99,102,241,.4);transition:transform .15s;width:100%;}
  .primary:active{transform:scale(.97);}
  .ghost{background:rgba(255,255,255,.06);border:1px solid var(--stroke);color:var(--ink);padding:11px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
  .ghost:active{background:rgba(255,255,255,.12);}
  /* dashboard */
  .dash{padding:16px 16px 18px;margin-bottom:14px;}
  .dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;}
  .secttitle{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.16em;}
  .yearsel{background:rgba(124,58,237,.3);color:#fff;border:1px solid var(--stroke);border-radius:10px;padding:7px 10px;font-size:14px;font-weight:700;cursor:pointer;}
  .dash2{display:grid;grid-template-columns:1fr 1fr;gap:10px;transition:opacity .2s;}
  .dstat{background:rgba(255,255,255,.05);border:1px solid var(--stroke);border-radius:14px;padding:14px;min-height:78px;display:flex;flex-direction:column;justify-content:center;}
  .dlbl{font-size:11px;font-weight:700;letter-spacing:.03em;margin-bottom:6px;}
  .dval{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;}
  .dimmed{opacity:.35;}
  .dbars{display:flex;align-items:flex-end;gap:4px;height:88px;margin-top:16px;}
  .db{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .dbbar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .5s cubic-bezier(.2,.7,.2,1);}
  .dbbar.cur{outline:2px solid #fff;outline-offset:1px;box-shadow:0 0 10px rgba(255,255,255,.5);}
  .dbl{font-size:8px;color:var(--dim);margin-top:4px;}
  .dbl.cur{color:#fff;font-weight:800;}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* month + hero */
  .month{padding:10px;margin-bottom:14px;}
  .navbtn{font-size:24px;padding:2px 18px;border-radius:11px;background:none;border:none;color:var(--ink);cursor:pointer;opacity:.9;transition:transform .15s;}
  .navbtn:active{transform:scale(.8);}
  .navbtn.dis{opacity:.22;cursor:default;}
  .mlabel{font-weight:700;min-width:150px;text-align:center;font-size:16px;}
  .hero{padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden;}
  .hero .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
  .hero .big{font-size:34px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;text-shadow:0 0 24px rgba(168,85,247,.35);}
  .pos{color:#5ee9b5;}.negc{color:#fb7185;}
  .hero .ring{position:absolute;width:180px;height:180px;border-radius:50%;border:1px solid rgba(255,255,255,.08);top:-60px;right:-50px;animation:spin 28s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .mini{padding:14px;min-height:74px;}
  .chip{display:inline-flex;font-size:11px;font-weight:700;padding:4px 9px;border-radius:9px;margin-bottom:9px;}
  .c-in{background:rgba(94,233,181,.15);color:#5ee9b5;}.c-ex{background:rgba(251,113,133,.15);color:#fb7185;}
  .mini .v{font-weight:800;font-size:18px;font-variant-numeric:tabular-nums;}
  .tabs{display:flex;flex-wrap:nowrap;gap:5px;padding:6px;margin-bottom:14px;}
  .tab{flex:1 1 0;text-align:center;padding:9px 5px;border-radius:12px;font-size:12px;font-weight:700;border:none;background:none;color:var(--dim);cursor:pointer;white-space:nowrap;transition:color .2s,transform .15s;}
  .tab:active{transform:scale(.94);}
  .tab.active{color:#fff;background:linear-gradient(135deg,var(--violet),var(--cyan));box-shadow:0 6px 16px rgba(124,58,237,.45);}
  .panel{padding:18px;}
  .donutwrap{position:relative;width:180px;height:180px;margin:6px auto 16px;animation:donutin .55s cubic-bezier(.2,.7,.2,1);}
  .db,.ybar{cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .db:active,.ybar:active{opacity:.7;}
  .addcc{margin:6px 0 4px;padding:12px;border:1px solid var(--stroke);border-radius:14px;background:rgba(255,255,255,.03);}
  .addcc .field{margin-bottom:8px;}
  @keyframes donutin{from{opacity:0;transform:scale(.86) rotate(-12deg)}to{opacity:1;transform:none}}
  /* status badge (localized, not background) */
  body{transition:background-color .4s ease,color .35s ease;}
  .moodbadge{display:inline-block;margin-top:7px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em;border:1px solid transparent;}
  .moodbadge.good{color:#34d399;background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);}
  .moodbadge.bad{color:#fb7185;background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.3);}
  /* hero glow tiers */
  .hero .big.glow1{text-shadow:0 0 18px rgba(94,233,181,.35);}
  .hero .big.glow2{text-shadow:0 0 26px rgba(94,233,181,.5);animation:hpulse 3.4s ease-in-out infinite;}
  .hero .big.glow3{text-shadow:0 0 40px rgba(94,233,181,.7);animation:hpulse 2.6s ease-in-out infinite;}
  @keyframes hpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
  /* skeleton shimmer */
  .dash.skel{position:relative;overflow:hidden;}
  .dash.skel::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.12) 50%,transparent 80%);transform:translateX(-100%);animation:shim 1s linear infinite;pointer-events:none;}
  @keyframes shim{to{transform:translateX(100%)}}
  /* coin burst */
  .coins{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
  .coins i{position:absolute;bottom:90px;font-size:24px;font-style:normal;animation:coinfly 1.2s cubic-bezier(.2,.7,.2,1) forwards;}
  @keyframes coinfly{0%{opacity:0;transform:translateY(0) translateX(0) scale(.6)}15%{opacity:1}100%{opacity:0;transform:translateY(-46vh) translateX(var(--dx)) scale(1.1) rotate(180deg)}}
  /* pull to refresh */
  .ptr{position:fixed;top:-44px;left:50%;transform:translateX(-50%);z-index:80;width:38px;height:38px;border-radius:50%;background:rgba(30,22,55,.96);border:1px solid var(--stroke);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s,transform .25s;box-shadow:0 6px 16px rgba(0,0,0,.4);}
  .ptr-spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#a855f7;border-radius:50%;}
  .ptr.go .ptr-spin{animation:sp .7s linear infinite;}
  /* light theme */
  body.light{--ink:#1c1838;--dim:#6b6792;--glass:rgba(255,255,255,.72);--stroke:rgba(20,12,50,.1);background:#eef0fa;}
  body.light .aurora{opacity:.4;}
  body.light .glass{box-shadow:0 10px 30px rgba(80,60,140,.12);}
  body.light .pill,body.light .btn,body.light .iconbtn,body.light .ghost{background:rgba(20,12,50,.05);}
  body.light .lrow input.va,body.light .qsel,body.light .field input,body.light .pinfield,body.light .dstat{background:rgba(20,12,50,.04);}
  body.light .toast,body.light .ptr,body.light .fab-lbl{background:rgba(40,30,70,.96);color:#fff;}
  body.light .navbtn,body.light .mlabel{color:#1c1838;}
  .donutwrap2{}
  .donutwrap .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donutwrap .ctr small{font-size:10px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;}
  .donutwrap .ctr b{font-size:17px;font-variant-numeric:tabular-nums;}
  .seg{transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
  .legend .li{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06);}
  .legend .li:last-child{border:none;}
  .dot{width:11px;height:11px;border-radius:4px;flex-shrink:0;box-shadow:0 0 8px currentColor;}
  .lrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);}
  .lrow:last-of-type{border-bottom:none;}
  .lrow input.nm{flex:1;min-width:0;border:none;font-size:14px;font-weight:600;background:transparent;color:var(--ink);padding:5px;}
  .lrow input.nm::placeholder{color:#6f6ba0;}
  .lrow input.va{width:108px;border:1px solid var(--stroke);border-radius:10px;padding:8px;text-align:right;font-size:14px;background:rgba(255,255,255,.05);color:var(--ink);font-variant-numeric:tabular-nums;}
  .lrow input.va:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(168,85,247,.25);}
  .lrow input.va.neg{color:#fb7185;}
  .lrow select.catsel{width:84px;flex-shrink:0;border:1px solid var(--stroke);border-radius:10px;padding:8px 5px;font-size:11px;background:rgba(255,255,255,.05);color:var(--ink);}
  .bgbar{height:7px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden;margin-top:2px;}
  .bgbar i{display:block;height:100%;border-radius:5px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .goalrow{padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:opacity .15s;}
  .goalrow:active{opacity:.6;}
  .goalrow:last-child{border-bottom:none;}
  .rbadge{font-size:9px;font-weight:800;padding:4px 6px;border-radius:6px;flex-shrink:0;letter-spacing:.05em;}
  .rbadge.in{background:rgba(94,233,181,.16);color:#5ee9b5;}
  .rbadge.ex{background:rgba(251,113,133,.16);color:#fb7185;}
  .del{background:none;border:none;font-size:16px;color:#6f6ba0;cursor:pointer;padding:2px 4px;}
  .del:active{color:#fb7185;}
  .foot{display:flex;justify-content:space-between;padding-top:14px;margin-top:8px;border-top:1px solid var(--stroke);font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;}
  .addbtn{margin-top:12px;}
  .rowbtns{display:flex;gap:8px;margin-top:10px;}
  .empty{text-align:center;color:#6f6ba0;padding:30px 0;font-size:14px;}
  .muted{font-size:12px;color:var(--dim);margin-top:12px;line-height:1.5;}
  .srow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px;}
  .srow:last-child{border:none;}.srow b{font-variant-numeric:tabular-nums;}
  .ybars{display:flex;align-items:flex-end;gap:6px;height:170px;padding-top:10px;}
  .ybar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .ybar .bar{width:100%;border-radius:6px 6px 0 0;min-height:2px;transition:height .6s cubic-bezier(.2,.7,.2,1);}
  .ybar .bar.cur{outline:2px solid #fff;outline-offset:1px;box-shadow:0 0 10px rgba(255,255,255,.5);}
  .ybar .ml{font-size:9px;color:var(--dim);margin-top:5px;}
  .ybar .ml.cur{color:#fff;font-weight:800;}
  /* overlays */
  .overlay,.sheetov{position:fixed;inset:0;z-index:60;display:flex;justify-content:center;padding:16px;animation:fade .2s ease;}
  .overlay{background:rgba(8,5,22,.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;}
  .sheetov{background:rgba(8,5,22,.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);align-items:flex-start;overflow-y:auto;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  .modal{width:100%;max-width:380px;padding:18px;animation:pop .28s cubic-bezier(.2,.7,.2,1);}
  .sheet{width:100%;max-width:760px;margin:6px 0 24px;animation:pop .3s cubic-bezier(.2,.7,.2,1);}
  .sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .ccopt{display:flex;align-items:center;gap:12px;padding:13px;border-radius:13px;border:1px solid var(--stroke);background:rgba(255,255,255,.05);margin-bottom:8px;cursor:pointer;font-size:15px;font-weight:600;}
  .ccopt:active{background:rgba(255,255,255,.12);}
  .ccopt .cc{font-size:18px;font-weight:800;width:42px;}

<body>
<div class="aurora"><b class="a1"></b><b class="a2"></b><b class="a3"></b><b class="a4"></b></div>
<div class="wrap" id="root"></div>
<script>
"use strict";
var REDUCE=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var MSHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var PALETTE=["#a855f7","#06b6d4","#10b981","#fbbf24","#ec4899","#6366f1","#fb7185","#34d399","#f472b6","#38bdf8","#c084fc","#facc15"];
var CCS=["MY","IN","SG","US"];
var COUNTRIES={
  MY:{name:"Malaysia",cur:"RM",code:"MYR",locale:"en-MY",salary:[["Basic",0],["Allowance",0],["Tax (PCB)",0],["EPF",0],["Socso",0]]},
  IN:{name:"India",cur:"\u20B9",code:"INR",locale:"en-IN",salary:[["Basic",0],["HRA",0],["Special Allowance",0],["Professional Tax",0],["Provident Fund (PF)",0],["TDS",0]]},
  SG:{name:"Singapore",cur:"S$",code:"SGD",locale:"en-SG",salary:[["Basic",0],["Allowance",0],["CPF (Employee)",0]]},
  US:{name:"United States",cur:"$",code:"USD",locale:"en-US",salary:[["Salary",0],["Federal Tax",0],["Social Security",0],["Medicare",0],["401(k)",0]]}
};
// income classification: carry (excluded), tax (refunds), other (transfers/gifts/etc.), salary (everything else)
var CARRY_KW=["balance b/f","b/f","brought forward","opening balance","carry forward"];
var TAX_KW=["refund"];
var OTHER_KW=["transfer","savings","adjustment","reimburse","gift","interest","cashback","dividend","commission","freelance","side income","rental income","other income","misc"];
function hasKW(name,list){var n=String(name||"").toLowerCase();for(var i=0;i<list.length;i++){if(n.indexOf(list[i])>=0)return true;}return false;}
var SALARY_KW=["basic","allowance","hra","wage","salary","stipend","gross pay"];
function incClass(name,amount){if(hasKW(name,CARRY_KW))return "carry";if((Number(amount)||0)<0)return "deduction";if(hasKW(name,TAX_KW))return "tax";if(hasKW(name,SALARY_KW))return "salary";return "other";}
function isSalary(name,amount){return incClass(name,amount)==="salary";}
function isTax(name,amount){return incClass(name,amount)==="tax";}
// expense categories
var DEFAULT_CATS=[["rent","Rent / Housing"],["food","Food & Groceries"],["bills","Utilities & Bills"],["transport","Transport"],["subs","Subscriptions"],["family","Family"],["health","Health"],["shopping","Shopping"],["edu","Education"],["other","Other"]];
function defaultCats(){return DEFAULT_CATS.map(function(c,i){return {id:c[0],name:c[1],color:PALETTE[i%PALETTE.length]};});}
function catById(id){var cs=data.categories||[];for(var i=0;i<cs.length;i++){if(cs[i].id===id)return cs[i];}return null;}
function catName(id){var c=catById(id);return c?c.name:"Uncategorized";}
function catColor(id){var c=catById(id);return c?c.color:"#6f6ba0";}
function budgets(){var b=book();if(!b.budgets)b.budgets={};return b.budgets;}
function backupAge(ts){var d=Math.floor((Date.now()-ts)/864e5);return d<=0?"today":(d===1?"yesterday":d+" days ago");}
function RECUR(){var b=book();if(!b.recurring)b.recurring=[];return b.recurring;}
function GOALS(){var b=book();if(!b.goals)b.goals=[];return b.goals;}
function applyRecurring(){var m=month();var n=0;RECUR().forEach(function(t){var nm=String(t.name||"").trim();if(!nm)return;var sec=t.type==="income"?"income":"expenses";var ex=false;m[sec].forEach(function(x){if(String(x.name||"").trim().toLowerCase()===nm.toLowerCase())ex=true;});if(!ex){var o={id:uid(),name:t.name,amount:Number(t.amount)||0};if(sec==="expenses")o.cat=t.cat||"";m[sec].push(o);n++;}});if(n)persist(data);return n;}

var LOGO='<svg viewBox="0 0 246 56" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">'
  +'<defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a855f7"/><stop offset=".55" stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>'
  +'<linearGradient id="ht" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c084fc"/><stop offset=".5" stop-color="#22d3ee"/><stop offset="1" stop-color="#34d399"/></linearGradient></defs>'
  +'<rect x="2" y="6" width="44" height="44" rx="13" fill="url(#hg)"/>'
  +'<text x="24" y="40" font-size="31" font-style="italic" font-weight="700" fill="#fff" text-anchor="middle">S</text>'
  +'<polyline points="62,20 78,14 92,17 108,8" fill="none" stroke="url(#ht)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
  +'<circle cx="108" cy="8" r="2.6" fill="#34d399"/>'
  +'<text x="60" y="41" font-family="Arial, sans-serif" font-size="29" font-weight="800" letter-spacing="-1.5" fill="url(#ht)">Satheesh</text>'
  +'<text x="62" y="53" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" letter-spacing="3.4" fill="#a9a6d6">PERSONAL FINANCE</text>'
  +'</svg>';

function uid(){return Math.random().toString(36).slice(2,9);}
function emptyBook(){return {months:{},receivables:[],budgets:{},recurring:[],goals:[]};}
function defaults(){var d={version:3,profile:{name:"",country:"MY",email:""},settings:{autoCarry:false,pin:"",bio:false,bioId:"",theme:"dark"},categories:defaultCats(),countries:JSON.parse(JSON.stringify(COUNTRIES)),books:{}};Object.keys(COUNTRIES).forEach(function(cc){d.books[cc]=emptyBook();});return d;}
function buildSeed(){var d=defaults();for(var i=1;i<=12;i++){var k="2026-"+("0"+i).slice(-2);d.books.MY.months[k]={income:COUNTRIES.MY.salary.map(function(r){return {id:uid(),name:r[0],amount:0};}),expenses:[]};}return d;}
function migrate(p){
  if(!p.profile)p.profile={name:"",country:"MY",email:""};
  if(!p.profile.country)p.profile.country="MY";
  if(typeof p.profile.email!=="string")p.profile.email="";
  if(!p.settings)p.settings={autoCarry:false,pin:"",bio:false,bioId:""};
  if(typeof p.settings.autoCarry!=="boolean")p.settings.autoCarry=false;
  if(typeof p.settings.pin!=="string")p.settings.pin="";
  if(typeof p.settings.bio!=="boolean")p.settings.bio=false;
  if(typeof p.settings.bioId!=="string")p.settings.bioId="";
  if(typeof p.settings.autoRecurring!=="boolean")p.settings.autoRecurring=false;
  if(typeof p.settings.lastBackup!=="number")p.settings.lastBackup=0;
  if(typeof p.settings.theme!=="string")p.settings.theme="dark";
  if(!p.books){p.books={};var home=p.profile.country||"MY";p.books[home]={months:p.months||{},receivables:p.receivables||[],budgets:{}};}
  if(!p.categories||!p.categories.length)p.categories=defaultCats();
  if(!p.countries)p.countries=JSON.parse(JSON.stringify(COUNTRIES));
  Object.keys(p.countries).forEach(function(cc){if(!p.books[cc])p.books[cc]=emptyBook();var bk=p.books[cc];if(!bk.budgets)bk.budgets={};if(!bk.receivables)bk.receivables=[];if(!bk.months)bk.months={};if(!bk.recurring)bk.recurring=[];if(!bk.goals)bk.goals=[];for(var k in bk.months){(bk.months[k].expenses||[]).forEach(function(r){if(typeof r.cat!=="string")r.cat="";});}});
  delete p.months;delete p.receivables;p.version=3;return p;
}
function load(){try{var v=localStorage.getItem("btx_v1");if(v)return migrate(JSON.parse(v));}catch(e){}var s=buildSeed();persist(s);return s;}
function persist(d){try{localStorage.setItem("btx_v1",JSON.stringify(d));}catch(e){}}

var data=load();
var NOW=new Date();
var state={tab:"overview",date:new Date(),anim:true,loading:false,showCurrency:false,sheet:null,pinSet:false,editBudgets:false,budgetEdit:null,editGoals:false,goalEdit:null,quickAdd:false,fabOpen:false,slide:"",viewYear:NOW.getFullYear(),viewMonth:null,locked:!!(data.settings.pin||data.settings.bio)};
if(state.date.getFullYear()!==2026)state.date=new Date(2026,5,1);
state.viewYear=state.date.getFullYear();

var BIO=!!(window.PublicKeyCredential&&navigator.credentials&&navigator.credentials.create);
function abToB64(buf){var b=new Uint8Array(buf),s="";for(var i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}
function b64ToAb(s){var bin=atob(s),b=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b.buffer;}
function rnd(n){var a=new Uint8Array(n);crypto.getRandomValues(a);return a;}
function enableBio(){if(!BIO){toast("Biometric not available on this device");return;}
  navigator.credentials.create({publicKey:{challenge:rnd(32),rp:{name:"Satheesh Personal Finance"},user:{id:rnd(16),name:(data.profile.name||"user"),displayName:(data.profile.name||"user")},pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},timeout:60000,attestation:"none"}})
  .then(function(cred){data.settings.bio=true;data.settings.bioId=abToB64(cred.rawId);persist(data);toast("Biometric unlock enabled");go(false);})
  .catch(function(e){toast("Couldn't enable biometric");});}
function disableBio(){data.settings.bio=false;data.settings.bioId="";persist(data);go(false);}
function doBio(){if(!BIO||!data.settings.bioId)return;navigator.credentials.get({publicKey:{challenge:rnd(32),timeout:60000,userVerification:"required",allowCredentials:[{type:"public-key",id:b64ToAb(data.settings.bioId)}]}}).then(function(){state.locked=false;go(true);}).catch(function(){var er=document.getElementById("pinerr");if(er)er.textContent="Biometric failed \u2014 use your PIN";});}

function CMAP(){if(!data.countries)data.countries=JSON.parse(JSON.stringify(COUNTRIES));return data.countries;}
function ccodes(){return Object.keys(CMAP());}
function CO(){return CMAP()[data.profile.country]||CMAP()[ccodes()[0]];}
function book(){var cc=data.profile.country;if(!data.books[cc])data.books[cc]=emptyBook();return data.books[cc];}
function pad(x){return("0"+x).slice(-2);}
function mKey(d){d=d||state.date;return d.getFullYear()+"-"+pad(d.getMonth()+1);}
function mLabel(){return MONTHS[state.date.getMonth()]+" "+state.date.getFullYear();}
function fmt(n){n=Number(n)||0;var c=CO();var s=Math.abs(n).toLocaleString(c.locale,{minimumFractionDigits:2,maximumFractionDigits:2});return(n<0?"\u2212"+c.cur+" ":c.cur+" ")+s;}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function month(k){k=k||mKey();var b=book();if(!b.months[k])b.months[k]={income:[],expenses:[]};return b.months[k];}
function RECV(){return book().receivables;}
function sum(list){var t=0;list.forEach(function(r){t+=Number(r.amount)||0;});return t;}
// month metrics
function totalsFor(k){var b=book();var m=b.months[k]||{income:[],expenses:[]};var a=sum(m.income),e=sum(m.expenses);return{avail:a,exp:e,closing:a-e};}
function totals(){return totalsFor(mKey());}
// year metrics
function periodStats(keys){var b=book();var inc=0,tax=0,oth=0,ded=0,exp=0;keys.forEach(function(k){var m=b.months[k];if(!m)return;
    m.income.forEach(function(r){var a=Number(r.amount)||0,cl=incClass(r.name,a);if(cl==="tax")tax+=a;else if(cl==="other")oth+=a;else if(cl==="salary")inc+=a;else if(cl==="deduction")ded+=a;});exp+=sum(m.expenses);});
  var recv=inc+tax+oth+ded;return {inc:inc,tax:tax,other:oth,ded:ded,exp:exp,received:recv,net:recv-exp,rate:recv>0?Math.round((recv-exp)/recv*100):0};}
function yearStats(yr){var keys=[];for(var i=0;i<12;i++)keys.push(yr+"-"+pad(i+1));return periodStats(keys);}
function hasYearData(yr){var b=book();for(var i=0;i<12;i++){var m=b.months[yr+"-"+pad(i+1)];if(m&&(m.income.length||m.expenses.length))return true;}return false;}

function prevKey(k){var p=k.split("-");var d=new Date(parseInt(p[0],10),parseInt(p[1],10)-1,1);d.setMonth(d.getMonth()-1);return mKey(d);}
function navBounds(){
  var b=book();var keys=[];for(var k in b.months){var m=b.months[k];if((m.income&&m.income.length)||(m.expenses&&m.expenses.length))keys.push(k);}
  keys.sort();
  var realKey=NOW.getFullYear()+"-"+pad(NOW.getMonth()+1);var cy=NOW.getFullYear();
  var min=keys.length?keys[0]:cy+"-01";
  var maxd=keys.length?keys[keys.length-1]:null;
  var max=maxd?(maxd>realKey?maxd:realKey):cy+"-12";
  var vy=state.viewYear;if((vy+"-01")<min)min=vy+"-01";if((vy+"-12")>max)max=vy+"-12";
  return {min:min,max:max};
}
function applyCarry(){if(!data.settings.autoCarry)return;var k=mKey();var pk=prevKey(k);var b=book();if(!b.months[pk])return;var closing=totalsFor(pk).closing;var m=month(k);var found=null;m.income.forEach(function(r){if(r.name==="Balance B/F")found=r;});if(found){found.amount=closing;}else{m.income.unshift({id:uid(),name:"Balance B/F",amount:closing});}persist(data);}

function donutSVG(list,total){var r=64,cx=80,cy=80,C=2*Math.PI*r,acc=0,segs="";
  if(total>0){list.forEach(function(it,i){var v=Math.abs(Number(it.amount)||0);if(v<=0)return;var frac=v/total,seg=frac*C,start=acc/total*360-90;acc+=v;
    segs+='<circle class="seg" cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+(it.color||PALETTE[i%PALETTE.length])+'" stroke-width="20" stroke-dasharray="'+seg+' '+C+'" stroke-dashoffset="'+(REDUCE?0:seg)+'" transform="rotate('+start+' '+cx+' '+cy+')" style="transition-delay:'+(i*0.09)+'s"></circle>';});}
  else{segs='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="20"></circle>';}
  return '<svg width="180" height="180" viewBox="0 0 160 160">'+segs+'</svg>';}
function drawDonut(){if(REDUCE)return;requestAnimationFrame(function(){document.querySelectorAll(".seg").forEach(function(c){c.style.strokeDashoffset="0";});});}
function countUp(el){var to=parseFloat(el.getAttribute("data-val"))||0;if(REDUCE||!state.anim){el.textContent=fmt(to);return;}var dur=650,st=performance.now();function step(now){var p=Math.min(1,(now-st)/dur);var e=1-Math.pow(1-p,3);el.textContent=fmt(to*e);if(p<1)requestAnimationFrame(step);else el.textContent=fmt(to);}el.textContent=fmt(0);requestAnimationFrame(step);}

function yearsList(){var ys={};ccodes().forEach(function(cc){var b=data.books[cc];if(b)for(var k in b.months)ys[k.split("-")[0]]=true;});var cur=NOW.getFullYear();for(var y=cur-2;y<=2036;y++)ys[y]=true;ys[state.viewYear]=true;return Object.keys(ys).map(Number).sort(function(a,b){return a-b;});}
function yearSelectHTML(cur){var o="";yearsList().forEach(function(y){o+='<option value="'+y+'"'+(y===cur?" selected":"")+'>'+y+'</option>';});return '<select class="yearsel" data-yearsel>'+o+'</select>';}
function monthSelectHTML(cur){var o='<option value="">Month</option>';for(var i=0;i<12;i++){o+='<option value="'+i+'"'+(cur===i?" selected":"")+'>'+MSHORT[i]+'</option>';}return '<select class="yearsel" data-monthsel>'+o+'</select>';}

function monthlyBars(yr,big){
  var vals=[],maxA=1;for(var i=0;i<12;i++){var tt=totalsFor(yr+"-"+pad(i+1));vals.push(tt.closing);if(Math.abs(tt.closing)>maxA)maxA=Math.abs(tt.closing);}
  var curM=(state.viewMonth!=null&&yr===state.viewYear)?state.viewMonth:((yr===NOW.getFullYear())?NOW.getMonth():-1);
  var H=big?150:64;var cls=big?"ybar":"db",barcls=big?"bar":"dbbar",lblcls=big?"ml":"dbl";
  var h='<div class="'+(big?"ybars":"dbars")+'">';
  vals.forEach(function(v,i){var hp=Math.max(big?2:3,Math.abs(v)/maxA*H);var col=v>=0?(big?"linear-gradient(180deg,#34d399,#10b981)":"#34d399"):(big?"linear-gradient(180deg,#fb7185,#ef4444)":"#fb7185");
    h+='<div class="'+cls+'" data-mb="'+i+'" data-mb-yr="'+yr+'"><div class="'+barcls+(i===curM?" cur":"")+'" style="height:'+(REDUCE?hp:(big?0:hp))+'px;background:'+col+'" data-h="'+hp+'"></div><div class="'+lblcls+(i===curM?" cur":"")+'">'+(big?MSHORT[i]:MSHORT[i].charAt(0))+'</div></div>';});
  h+='</div>';return h;
}

function catOptions(sel){var o='<option value="">-Select-</option>';(data.categories||[]).forEach(function(c){o+='<option value="'+c.id+'"'+(c.id===sel?" selected":"")+'>'+esc(c.name)+'</option>';});return o;}
function catBreakdown(){var m=month(),map={},order=[];m.expenses.forEach(function(r){var id=r.cat||"";if(!(id in map)){map[id]=0;order.push(id);}map[id]+=Math.abs(Number(r.amount)||0);});
  return order.map(function(id){return {id:id,name:catName(id),color:catColor(id),amount:map[id]};}).sort(function(a,b){return b.amount-a.amount;});}
function lineRows(section){var list=month()[section],h="",seen={},isExp=(section==="expenses");
  list.forEach(function(r){if(seen[r.id])return;seen[r.id]=1;var neg=(Number(r.amount)||0)<0;
    h+='<div class="lrow" data-rowid="'+r.id+'" data-rowsec="'+section+'"><input class="nm" data-edit="'+section+'" data-id="'+r.id+'" data-field="name" value="'+esc(r.name)+'" placeholder="Item">'
      +(isExp?'<select class="catsel" data-edit="'+section+'" data-id="'+r.id+'" data-field="cat">'+catOptions(r.cat||"")+'</select>':'')
      +'<input class="va'+(neg?" neg":"")+'" data-edit="'+section+'" data-id="'+r.id+'" data-field="amount" type="number" inputmode="decimal" value="'+(r.amount===0||r.amount?r.amount:"")+'">'
      +'<button class="del" data-delid="'+r.id+'" data-delsec="'+section+'">&#128465;</button></div>';});
  return h||'<div class="empty">No data available</div>';}
function tab(id,label){return '<button class="tab '+(state.tab===id?"active":"")+'" data-tab="'+id+'">'+label+'</button>';}

function render(){
  var root=document.getElementById("root");
  document.body.classList.toggle("lock",!!(state.sheet||state.showCurrency||state.pinSet||state.locked));
  document.body.classList.toggle("light",data.settings.theme==="light");

  if(state.locked){
    root.classList.remove("anim");
    var hasPin=!!data.settings.pin,hasBio=data.settings.bio;
    var lk='<div class="lockwrap"><div class="brandmark" style="margin-bottom:6px">'+LOGO+'</div><div class="lk">&#128274;</div>'
      +'<div style="color:var(--dim);font-size:14px">'+(hasPin?"Enter your PIN to unlock":"Unlock with biometric")+'</div>';

  root.querySelectorAll("[data-redit]").forEach(function(el){el.onchange=function(){var id=el.getAttribute("data-redit"),f=el.getAttribute("data-field");var r=RECV().filter(function(x){return x.id===id;})[0];if(r){r[f]=(f==="amount")?(el.value===""?0:Number(el.value)):el.value;persist(data);go(false);}};});
  root.querySelectorAll("[data-radd]").forEach(function(el){el.onclick=function(){book().receivables.push({id:uid(),name:"",amount:0,note:""});persist(data);go(false);};});
  root.querySelectorAll("[data-rdel]").forEach(function(el){el.onclick=function(){deleteRow("recv",el.getAttribute("data-rdel"));};});
  root.querySelectorAll("[data-recedit]").forEach(function(el){el.onchange=function(){var id=el.getAttribute("data-recedit"),f=el.getAttribute("data-field");var r=RECUR().filter(function(x){return x.id===id;})[0];if(r){r[f]=(f==="amount")?(el.value===""?0:Number(el.value)):el.value;persist(data);go(false);}};});
  root.querySelectorAll("[data-recdel]").forEach(function(el){el.onclick=function(){var id=el.getAttribute("data-recdel");var b=book();b.recurring=RECUR().filter(function(x){return x.id!==id;});persist(data);go(false);};});
  var pn=root.querySelector("[data-pname]");if(pn)pn.onchange=function(){data.profile.name=pn.value;persist(data);};
  var pe=root.querySelector("[data-pemail]");if(pe)pe.onchange=function(){data.profile.email=pe.value;persist(data);};
}

function copyLast(sec){var pk=prevKey(mKey());var pm=book().months[pk];if(!pm||!pm[sec]||pm[sec].length===0){toast("Nothing in last month to copy");return;}var cur=month();if(cur[sec].length>0&&!confirm("Replace this month\u2019s "+sec+" with last month\u2019s?"))return;cur[sec]=pm[sec].map(function(r){var o={id:uid(),name:r.name,amount:r.amount};if(sec==="expenses")o.note=r.note||"";return o;});persist(data);go(false);}
function exportCSV(){var rows=[["Country","Currency","Month","Section","Item","Amount"]];ccodes().forEach(function(cc){var b=data.books[cc];if(!b)return;var co=CMAP()[cc];var code=co.code;Object.keys(b.months).sort().forEach(function(k){var m=b.months[k];m.income.forEach(function(r){rows.push([co.name,code,k,"Income",csv(r.name),r.amount]);});m.expenses.forEach(function(r){rows.push([co.name,code,k,"Expense",csv(r.name),r.amount]);});});b.receivables.forEach(function(r){rows.push([co.name,code,"\u2014","Receivable",csv(r.name),r.amount]);});});var out=rows.map(function(r){return r.join(",");}).join("\n");var b=new Blob([out],{type:"text/csv"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="satheesh-finance.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);}
function csv(s){return String(s||"").replace(/,/g," ");}
function backupData(){data.settings.lastBackup=Date.now();persist(data);var out=JSON.stringify(data);var b=new Blob([out],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="satheesh-data.json";document.body.appendChild(a);a.click();document.body.removeChild(a);go(false);toast("Backup downloaded");}
var fileInput=document.createElement("input");fileInput.type="file";fileInput.accept=".json,application/json";fileInput.style.display="none";document.body.appendChild(fileInput);
fileInput.onchange=function(){var f=fileInput.files&&fileInput.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{var p=JSON.parse(r.result);if(!p||(!p.months&&!p.books)){toast("That file isn't a valid backup");return;}data=migrate(p);persist(data);state.locked=!!(data.settings.pin||data.settings.bio);go(true);toast("Imported \u2014 your accounts are loaded");}catch(e){toast("Sorry, that file couldn't be read");}};r.readAsText(f);};
function pickImport(){fileInput.value="";fileInput.click();}

applyCarry();
if(data.settings.autoRecurring)applyRecurring();
render();
setupPTR();
</script>
