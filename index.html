<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#1a1038" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Satheesh — Personal Finance</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%220%22%20y1%3D%220%22%20x2%3D%221%22%20y2%3D%221%22%3E%3Cstop%20offset%3D%220%22%20stop-color%3D%22%23a855f7%22%2F%3E%3Cstop%20offset%3D%22.55%22%20stop-color%3D%22%236366f1%22%2F%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2306b6d4%22%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%22120%22%20fill%3D%22url%28%23g%29%22%2F%3E%3Ctext%20x%3D%22256%22%20y%3D%22388%22%20font-family%3D%22Georgia%2Cserif%22%20font-size%3D%22320%22%20font-style%3D%22italic%22%20font-weight%3D%22700%22%20fill%3D%22%23fff%22%20text-anchor%3D%22middle%22%3ES%3C%2Ftext%3E%3Ccircle%20cx%3D%22372%22%20cy%3D%22150%22%20r%3D%2216%22%20fill%3D%22%23fff%22%20opacity%3D%22.9%22%2F%3E%3C%2Fsvg%3E" />
<style>
  :root{
    --violet:#a855f7; --indigo:#6366f1; --cyan:#06b6d4; --emerald:#10b981;
    --amber:#fbbf24; --pink:#ec4899; --rose:#fb7185;
    --glass:rgba(255,255,255,.08); --glass2:rgba(255,255,255,.05);
    --stroke:rgba(255,255,255,.14); --ink:#f1f0ff; --dim:#a9a6d6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--ink); background:#150f30; overflow-x:hidden; min-height:100vh; padding:16px;
  }
  /* drifting aurora */
  .aurora{position:fixed;inset:-30% -20%;z-index:-1;filter:blur(60px);opacity:.85;}
  .aurora b{position:absolute;border-radius:50%;mix-blend-mode:screen;}
  .a1{width:60vw;height:60vw;background:#7c3aed;top:-10%;left:-10%;animation:f1 18s ease-in-out infinite;}
  .a2{width:55vw;height:55vw;background:#06b6d4;bottom:-15%;right:-10%;animation:f2 22s ease-in-out infinite;}
  .a3{width:45vw;height:45vw;background:#ec4899;top:30%;right:20%;animation:f3 26s ease-in-out infinite;}
  .a4{width:40vw;height:40vw;background:#10b981;bottom:10%;left:15%;animation:f1 30s ease-in-out infinite reverse;}
  @keyframes f1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8%,6%) scale(1.15)}}
  @keyframes f2{0%,100%{transform:translate(0,0) scale(1.1)}50%{transform:translate(-7%,-5%) scale(.95)}}
  @keyframes f3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6%,7%) scale(1.2)}}
  .wrap{max-width:760px;margin:0 auto;position:relative;}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .center{justify-content:center;}
  .glass{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border:1px solid var(--stroke);border-radius:20px;box-shadow:0 10px 30px rgba(10,5,30,.35);}
  /* header */
  .brand{font-family:Georgia,"Times New Roman",serif;font-style:italic;font-weight:700;font-size:26px;
    background:linear-gradient(92deg,var(--violet),var(--cyan) 60%,var(--emerald));
    -webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.5px;}
  .tagline{font-size:11px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;margin-top:1px;}
  .brandmark svg{height:50px;width:auto;display:block;filter:drop-shadow(0 4px 12px rgba(124,58,237,.4));}
  .logo{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-family:Georgia,serif;font-style:italic;font-weight:700;font-size:24px;color:#fff;
    background:linear-gradient(135deg,var(--violet),var(--cyan));box-shadow:0 6px 18px rgba(124,58,237,.5);}
  .btn{border:none;background:rgba(255,255,255,.07);color:var(--ink);font-size:13px;font-weight:600;
    padding:9px 12px;border-radius:11px;cursor:pointer;border:1px solid var(--stroke);transition:transform .15s,background .2s;}
  .btn:active{transform:scale(.93);background:rgba(255,255,255,.14);}
  .primary{background:linear-gradient(135deg,var(--violet),var(--indigo));color:#fff;padding:12px 16px;
    border-radius:13px;font-size:14px;font-weight:700;border:none;cursor:pointer;box-shadow:0 8px 20px rgba(99,102,241,.4);
    transition:transform .15s,box-shadow .2s;}
  .primary:active{transform:scale(.97);box-shadow:0 4px 12px rgba(99,102,241,.35);}
  /* month nav */
  .month{padding:10px;margin:16px 0;}
  .navbtn{font-size:24px;padding:2px 18px;border-radius:11px;background:none;border:none;color:var(--ink);cursor:pointer;opacity:.85;transition:transform .15s;}
  .navbtn:active{transform:scale(.8);}
  .mlabel{font-weight:700;min-width:170px;text-align:center;font-size:16px;letter-spacing:.02em;}
  /* hero */
  .hero{padding:20px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden;}
  .hero .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
  .hero .big{font-size:38px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums;
    text-shadow:0 0 24px rgba(168,85,247,.35);}
  .pos{color:#5ee9b5;} .negc{color:#fb7185;}
  .hero .ring{position:absolute;width:180px;height:180px;border-radius:50%;border:1px solid rgba(255,255,255,.08);
    top:-60px;right:-50px;animation:spin 28s linear infinite;}
  .hero .ring::after{content:"";position:absolute;inset:18px;border-radius:50%;border:1px dashed rgba(255,255,255,.07);}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* mini cards */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
  .mini{padding:14px;}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.05em;
    padding:4px 9px;border-radius:9px;margin-bottom:9px;}
  .c-in{background:rgba(94,233,181,.15);color:#5ee9b5;}
  .c-ex{background:rgba(251,113,133,.15);color:#fb7185;}
  .c-rc{background:rgba(251,191,36,.16);color:#fcd34d;}
  .c-cl{background:rgba(168,85,247,.18);color:#d8b4fe;}
  .mini .v{font-weight:800;font-size:18px;font-variant-numeric:tabular-nums;}
  /* tabs */
  .tabs{display:flex;gap:5px;padding:5px;margin-bottom:14px;overflow-x:auto;}
  .tab{padding:9px 14px;border-radius:13px;font-size:13px;font-weight:700;border:none;background:none;color:var(--dim);
    cursor:pointer;white-space:nowrap;transition:color .2s,transform .15s;}
  .tab:active{transform:scale(.94);}
  .tab.active{color:#fff;background:linear-gradient(135deg,var(--violet),var(--cyan));box-shadow:0 6px 16px rgba(124,58,237,.45);}
  .panel{padding:18px;}
  .secttitle{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.16em;margin-bottom:8px;}
  /* donut */
  .donutwrap{position:relative;width:180px;height:180px;margin:6px auto 16px;}
  .donutwrap .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donutwrap .ctr small{font-size:10px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;}
  .donutwrap .ctr b{font-size:18px;font-variant-numeric:tabular-nums;}
  .seg{transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);}
  .legend .li{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06);}
  .legend .li:last-child{border:none;}
  .dot{width:11px;height:11px;border-radius:4px;flex-shrink:0;box-shadow:0 0 8px currentColor;}
  /* editable rows */
  .lrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);}
  .lrow:last-of-type{border-bottom:none;}
  .lrow input.nm{flex:1;min-width:0;border:none;font-size:14px;font-weight:600;background:transparent;color:var(--ink);padding:5px;}
  .lrow input.nm::placeholder{color:#6f6ba0;}
  .lrow input.va{width:104px;border:1px solid var(--stroke);border-radius:10px;padding:8px;text-align:right;
    font-size:14px;background:rgba(255,255,255,.05);color:var(--ink);font-variant-numeric:tabular-nums;transition:border-color .2s,box-shadow .2s;}
  .lrow input.va:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(168,85,247,.25);}
  .lrow input.va.neg{color:#fb7185;}
  .del{background:none;border:none;font-size:16px;color:#6f6ba0;cursor:pointer;padding:2px 4px;transition:transform .15s,color .2s;}
  .del:active{transform:scale(.8);color:#fb7185;}
  .foot{display:flex;justify-content:space-between;padding-top:14px;margin-top:8px;
    border-top:1px solid var(--stroke);font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;}
  .addbtn{margin-top:12px;width:100%;}
  .empty{text-align:center;color:#6f6ba0;padding:30px 0;font-size:14px;}
  .muted{font-size:12px;color:var(--dim);margin-top:12px;line-height:1.5;}
  .srow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px;}
  .srow:last-child{border:none;}
  .srow b{font-variant-numeric:tabular-nums;}
  /* entrance */
  .anim .stagger{opacity:0;animation:rise .55s cubic-bezier(.2,.7,.2,1) forwards;}
  .anim .stagger:nth-child(1){animation-delay:.02s}
  .anim .stagger:nth-child(2){animation-delay:.08s}
  .anim .stagger:nth-child(3){animation-delay:.14s}
  .anim .stagger:nth-child(4){animation-delay:.20s}
  .anim .stagger:nth-child(5){animation-delay:.26s}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
    .seg{transition:none !important;}
  }
</style>
</head>
<body>
<div class="aurora"><b class="a1"></b><b class="a2"></b><b class="a3"></b><b class="a4"></b></div>
<div class="wrap" id="root"></div>
<script>
"use strict";
var LOGO='<svg viewBox="0 0 246 56" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">'
  +'<defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a855f7"/><stop offset=".55" stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>'
  +'<linearGradient id="ht" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#c084fc"/><stop offset=".5" stop-color="#22d3ee"/><stop offset="1" stop-color="#34d399"/></linearGradient></defs>'
  +'<rect x="2" y="6" width="44" height="44" rx="13" fill="url(#hg)"/>'
  +'<text x="24" y="40" font-size="31" font-style="italic" font-weight="700" fill="#fff" text-anchor="middle">S</text>'
  +'<polyline points="62,20 78,14 92,17 108,8" fill="none" stroke="url(#ht)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
  +'<circle cx="108" cy="8" r="2.6" fill="#34d399"/>'
  +'<text x="60" y="41" font-family="Arial, sans-serif" font-size="29" font-weight="800" letter-spacing="-1.5" fill="url(#ht)">Satheesh</text>'
  +'<text x="62" y="53" font-family="Arial, sans-serif" font-size="7.5" font-weight="700" letter-spacing="3.4" fill="#a9a6d6">PERSONAL FINANCE</text>'
  +'</svg>';
var REDUCE = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var PALETTE=["#a855f7","#06b6d4","#10b981","#fbbf24","#ec4899","#6366f1","#fb7185","#34d399","#f472b6","#38bdf8","#c084fc","#facc15"];

var MT_INC=[["Basic",0],["Allowance",0],["Tax (PCB)",0],["EPF",0],["Socso",0]];
var MT_EXP=[["Rental",0],["Groceries",0],["WiFi",0],["Electricity",0],["Water",0]];
var SEED={version:1,months:{},receivables:[]};
for(var _i=1;_i<=12;_i++){var _k="2026-"+("0"+_i).slice(-2);SEED.months[_k]={income:MT_INC.map(function(r){return r.slice();}),expenses:MT_EXP.map(function(r){return r.slice();})};}

function uid(){return Math.random().toString(36).slice(2,9);}
function buildSeed(){var d={version:SEED.version,months:{},receivables:[]};for(var k in SEED.months){var m=SEED.months[k];d.months[k]={income:m.income.map(function(r){return{id:uid(),name:r[0],amount:r[1]};}),expenses:m.expenses.map(function(r){return{id:uid(),name:r[0],amount:r[1],note:r[2]||""};})};}d.receivables=SEED.receivables.map(function(r){return{id:uid(),name:r[0],amount:r[1],note:r[2]||""};});return d;}
function load(){try{var v=localStorage.getItem("btx_v1");if(v)return JSON.parse(v);}catch(e){}var s=buildSeed();persist(s);return s;}
function persist(d){try{localStorage.setItem("btx_v1",JSON.stringify(d));}catch(e){}}

var data=load();
var state={tab:"overview",date:new Date(),anim:true};
if(state.date.getFullYear()!==2026)state.date=new Date(2026,5,1);

function pad(x){return("0"+x).slice(-2);}
function mKey(){return state.date.getFullYear()+"-"+pad(state.date.getMonth()+1);}
function mLabel(){return MONTHS[state.date.getMonth()]+" "+state.date.getFullYear();}
function fmt(n){n=Number(n)||0;var s=Math.abs(n).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2});return(n<0?"−RM ":"RM ")+s;}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function curMonth(){var k=mKey();if(!data.months[k])data.months[k]={income:[],expenses:[]};return data.months[k];}
function sum(list){var t=0;list.forEach(function(r){t+=Number(r.amount)||0;});return t;}
function totals(){var m=curMonth();var a=sum(m.income),e=sum(m.expenses);return{avail:a,exp:e,closing:a-e};}

function donutSVG(list,total){
  var r=64,cx=80,cy=80,C=2*Math.PI*r,acc=0,segs="";
  if(total>0){
    list.forEach(function(it,i){
      var v=Math.abs(Number(it.amount)||0); if(v<=0) return;
      var frac=v/total, seg=frac*C, start=acc/total*360-90; acc+=v;
      segs+='<circle class="seg" cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+PALETTE[i%PALETTE.length]+'" stroke-width="20" stroke-linecap="butt" '
        +'stroke-dasharray="'+seg+' '+C+'" stroke-dashoffset="'+(REDUCE?0:seg)+'" data-off="'+seg+'" '
        +'transform="rotate('+start+' '+cx+' '+cy+')" style="transition-delay:'+(i*0.09)+'s"></circle>';
    });
  } else {
    segs='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="20"></circle>';
  }
  return '<svg width="180" height="180" viewBox="0 0 160 160">'+segs+'</svg>';
}
function drawDonut(){ if(REDUCE)return; requestAnimationFrame(function(){ document.querySelectorAll(".seg").forEach(function(c){ c.style.strokeDashoffset="0"; }); }); }

function countUp(el){
  var to=parseFloat(el.getAttribute("data-val"))||0;
  if(REDUCE||!state.anim){ el.textContent=fmt(to); return; }
  var dur=700, st=performance.now();
  function step(now){ var p=Math.min(1,(now-st)/dur); var e=1-Math.pow(1-p,3); el.textContent=fmt(to*e); if(p<1)requestAnimationFrame(step); else el.textContent=fmt(to); }
  el.textContent=fmt(0); requestAnimationFrame(step);
}

function lineRows(section){
  var list=curMonth()[section],h="";
  list.forEach(function(r){
    var neg=(Number(r.amount)||0)<0;
    h+='<div class="lrow">'
      +'<input class="nm" data-edit="'+section+'" data-id="'+r.id+'" data-field="name" value="'+esc(r.name)+'" placeholder="Item">'
      +'<input class="va'+(neg?" neg":"")+'" data-edit="'+section+'" data-id="'+r.id+'" data-field="amount" type="number" inputmode="decimal" value="'+(r.amount===0||r.amount?r.amount:"")+'">'
      +'<button class="del" data-delid="'+r.id+'" data-delsec="'+section+'">&#128465;</button></div>';
  });
  return h;
}
function tab(id,label){return '<button class="tab '+(state.tab===id?"active":"")+'" data-tab="'+id+'">'+label+'</button>';}

function render(){
  var t=totals(),m=curMonth(),rt=sum(data.receivables),h="";

  h+='<div class="row between" style="margin-bottom:4px">'
    +'<div class="brandmark">'+LOGO+'</div>'
    +'<div class="row" style="gap:6px"><button class="btn" data-act="export">Export</button><button class="btn" data-act="reset">Reset</button></div>'
    +'</div>';

  h+='<div class="glass month row center"><button class="navbtn" data-act="prev">&lsaquo;</button>'
    +'<span class="mlabel">'+mLabel()+'</span><button class="navbtn" data-act="next">&rsaquo;</button></div>';

  h+='<div class="glass hero"><div class="ring"></div>'
    +'<div class="lbl">Closing balance</div>'
    +'<div class="big '+(t.closing>=0?"pos":"negc")+' count" data-val="'+t.closing+'">'+fmt(t.closing)+'</div></div>';

  h+='<div class="cards">'
    +'<div class="glass mini stagger"><span class="chip c-in">Available</span><div class="v count" data-val="'+t.avail+'">'+fmt(t.avail)+'</div></div>'
    +'<div class="glass mini stagger"><span class="chip c-ex">Expenses</span><div class="v count" data-val="'+t.exp+'">'+fmt(t.exp)+'</div></div>'
    +'</div>';

  h+='<div class="glass tabs">'+tab("overview","Overview")+tab("income","Income")+tab("expenses","Expenses")+tab("recv","Receivables")+'</div>';

  if(state.tab==="overview"){
    h+='<div class="glass panel stagger"><div class="secttitle">EXPENSE BREAKDOWN</div>';
    if(m.expenses.length===0){h+='<div class="empty">Nothing spent yet this month</div>';}
    else{
      h+='<div class="donutwrap">'+donutSVG(m.expenses,t.exp)+'<div class="ctr"><small>Spent</small><b>'+fmt(t.exp)+'</b></div></div><div class="legend">';
      m.expenses.forEach(function(r,i){var v=Math.abs(Number(r.amount)||0);var p=t.exp>0?Math.round(v/t.exp*100):0;
        h+='<div class="li"><span class="dot" style="background:'+PALETTE[i%PALETTE.length]+';color:'+PALETTE[i%PALETTE.length]+'"></span><span style="flex:1">'+esc(r.name)+'</span><span style="font-variant-numeric:tabular-nums">'+fmt(v)+' · '+p+'%</span></div>';});
      h+='</div>';
    }
    h+='</div>';
    h+='<div class="glass panel stagger" style="margin-top:14px"><div class="secttitle">SNAPSHOT</div>'
      +'<div class="srow"><span>Total available</span><b class="pos">'+fmt(t.avail)+'</b></div>'
      +'<div class="srow"><span>Total expenses</span><b class="negc">'+fmt(t.exp)+'</b></div>'
      +'<div class="srow"><span>Closing balance</span><b style="color:'+(t.closing>=0?"#d8b4fe":"#fb7185")+'">'+fmt(t.closing)+'</b></div>'
      +'<div class="srow"><span>Owed to you</span><b style="color:#fcd34d">'+fmt(rt)+'</b></div></div>';
  }

  if(state.tab==="income"){
    h+='<div class="glass panel stagger"><div class="secttitle">INCOME &amp; DEDUCTIONS</div>'+lineRows("income")
      +'<button class="primary addbtn" data-add="income">+ Add income / deduction</button>'
      +'<div class="foot"><span>Total available</span><span class="pos">'+fmt(t.avail)+'</span></div>'
      +'<div class="muted">Enter deductions (PCB, EPF, Socso) as negatives, e.g. −167. Balance B/F and Tax Refund go here too.</div></div>';
  }
  if(state.tab==="expenses"){
    h+='<div class="glass panel stagger"><div class="secttitle">EXPENSES</div>'+lineRows("expenses")
      +'<button class="primary addbtn" data-add="expenses">+ Add expense</button>'
      +'<div class="foot"><span>Total expenses</span><span class="negc">'+fmt(t.exp)+'</span></div></div>';
  }
  if(state.tab==="recv"){
    h+='<div class="glass panel stagger"><div class="secttitle">OUTSTANDING RECEIVABLES</div>';
    data.receivables.forEach(function(r){
      h+='<div class="lrow"><input class="nm" data-redit="'+r.id+'" data-field="name" value="'+esc(r.name)+'" placeholder="Who owes you">'
        +'<input class="va" data-redit="'+r.id+'" data-field="amount" type="number" inputmode="decimal" value="'+(r.amount||"")+'">'
        +'<button class="del" data-rdel="'+r.id+'">&#128465;</button></div>';
      if(r.note)h+='<div class="muted" style="margin:-4px 0 8px 5px">'+esc(r.note)+'</div>';
    });
    h+='<button class="primary addbtn" data-radd="1">+ Add receivable</button>'
      +'<div class="foot"><span>Owed to you</span><span style="color:#fcd34d">'+fmt(rt)+'</span></div>'
      +'<div class="muted">Receivables stay across every month until you clear them.</div></div>';
  }

  var root=document.getElementById("root");
  root.innerHTML=h;
  root.classList.toggle("anim",state.anim);
  root.querySelectorAll(".count").forEach(countUp);
  drawDonut();
  attach();
}

function go(anim){state.anim=anim;render();}

function attach(){
  var root=document.getElementById("root");
  root.querySelectorAll("[data-tab]").forEach(function(el){el.onclick=function(){state.tab=el.getAttribute("data-tab");go(true);};});
  root.querySelectorAll("[data-act]").forEach(function(el){el.onclick=function(){
    var a=el.getAttribute("data-act");
    if(a==="prev"){state.date.setMonth(state.date.getMonth()-1);go(true);}
    else if(a==="next"){state.date.setMonth(state.date.getMonth()+1);go(true);}
    else if(a==="export"){exportCSV();}
    else if(a==="reset"){if(confirm("Reset all data back to your original spreadsheet figures? Your edits will be lost.")){data=buildSeed();persist(data);go(true);}}
  };});
  root.querySelectorAll("[data-edit]").forEach(function(el){el.onchange=function(){
    var sec=el.getAttribute("data-edit"),id=el.getAttribute("data-id"),f=el.getAttribute("data-field");
    var r=curMonth()[sec].filter(function(x){return x.id===id;})[0];
    if(r){r[f]=(f==="amount")?(el.value===""?0:Number(el.value)):el.value;persist(data);go(false);}
  };});
  root.querySelectorAll("[data-add]").forEach(function(el){el.onclick=function(){
    var sec=el.getAttribute("data-add"),o={id:uid(),name:"",amount:0};if(sec==="expenses")o.note="";
    curMonth()[sec].push(o);persist(data);go(false);
  };});
  root.querySelectorAll("[data-delid]").forEach(function(el){el.onclick=function(){
    var id=el.getAttribute("data-delid"),sec=el.getAttribute("data-delsec"),m=curMonth();
    m[sec]=m[sec].filter(function(x){return x.id!==id;});persist(data);go(false);
  };});
  root.querySelectorAll("[data-redit]").forEach(function(el){el.onchange=function(){
    var id=el.getAttribute("data-redit"),f=el.getAttribute("data-field");
    var r=data.receivables.filter(function(x){return x.id===id;})[0];
    if(r){r[f]=(f==="amount")?(el.value===""?0:Number(el.value)):el.value;persist(data);go(false);}
  };});
  root.querySelectorAll("[data-radd]").forEach(function(el){el.onclick=function(){data.receivables.push({id:uid(),name:"",amount:0,note:""});persist(data);go(false);};});
  root.querySelectorAll("[data-rdel]").forEach(function(el){el.onclick=function(){var id=el.getAttribute("data-rdel");data.receivables=data.receivables.filter(function(x){return x.id!==id;});persist(data);go(false);};});
}

function exportCSV(){
  var rows=[["Month","Section","Item","Amount (MYR)"]];
  Object.keys(data.months).sort().forEach(function(k){var m=data.months[k];
    m.income.forEach(function(r){rows.push([k,"Income",csv(r.name),r.amount]);});
    m.expenses.forEach(function(r){rows.push([k,"Expense",csv(r.name),r.amount]);});});
  data.receivables.forEach(function(r){rows.push(["—","Receivable",csv(r.name),r.amount]);});
  var out=rows.map(function(r){return r.join(",");}).join("\n");
  var b=new Blob([out],{type:"text/csv"}),a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download="satz-fin-2026.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function csv(s){return String(s||"").replace(/,/g," ");}

render();
</script>
</body>
</html>
